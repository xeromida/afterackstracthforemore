<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSDALOP ENGINE REBORN v1.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0b0d; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; position: relative; }
        
        #toggle-btn {
            position: absolute; top: 15px; left: 15px; z-index: 1005;
            background: #f97316; color: #0b0b0d; border: none; padding: 8px 14px;
            font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.4); transition: 0.2s;
        }
        #toggle-btn:hover { background: #fb923c; }

        #sidebar { 
            position: absolute; left: 0; top: 0; height: 100%; width: 360px;
            background: #111827; border-right: 1px solid #1e293b; 
            padding: 20px; padding-top: 65px;
            display: flex; flex-direction: column; gap: 15px; 
            z-index: 1002; overflow-y: auto; transition: left 0.3s ease;
        }
        #sidebar.closed { left: -360px; }

        h1 { color: #f97316; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .sub-title { color: #94a3b8; font-size: 11px; margin-top: -3px; }
        
        .time-box { background: #000; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; display: flex; flex-direction: column; gap: 5px; }
        .clock { text-align: center; font-family: monospace; font-size: 26px; color: #4ade80; font-weight: bold; text-shadow: 0 0 10px rgba(74,222,128,0.3); }
        
        .time-controls { background: #1f2937; padding: 10px; border-radius: 6px; font-size: 12px; border: 1px solid #374151; }
        .time-controls input[type="range"] { width: 100%; margin: 8px 0; accent-color: #f97316; cursor: pointer; }
        .speed-reset-container { display: flex; gap: 5px; justify-content: space-between; margin-top: 5px; }
        .speed-select { background: #111827; color: #fff; border: 1px solid #374151; padding: 4px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .reset-btn { background: #ef4444; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.2s; }
        .reset-btn:hover { background: #dc2626; }

        .search-box { width: 100%; padding: 10px; background: #1f2937; border: 1px solid #374151; color: #fff; border-radius: 6px; font-size: 13px; }
        .search-box:focus { border-color: #f97316; outline: none; }
        
        .train-card { background: #1f2937; padding: 12px; border-radius: 6px; border-left: 4px solid #f97316; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .train-card:hover { background: #374151; }
        .train-card.selected { border-left-color: #22c55e; background: #14532d; }
        .train-name { font-weight: bold; color: #fff; font-size: 14px; }
        
        /* PANEL KANAN (RUNDOWN ITINERARY & STASIUN) */
        #right-panel {
            position: absolute; right: -380px; top: 0; height: 100%; width: 380px;
            background: #111827; border-left: 1px solid #1e293b; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            z-index: 1003; overflow-y: auto; transition: right 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        #right-panel.open { right: 0; }
        .close-right-btn {
            background: #ef4444; color: #fff; border: none; padding: 8px; border-radius: 6px; 
            cursor: pointer; font-weight: bold; font-size: 12px; align-self: flex-end; transition: 0.2s;
        }
        .close-right-btn:hover { background: #dc2626; }
        
        .rundown-table { width: 100%; color: #e2e8f0; font-size: 11px; border-collapse: collapse; margin-top: 10px; }
        .rundown-table th, .rundown-table td { padding: 8px 6px; border-bottom: 1px solid #374151; text-align: left; }
        .rundown-table th { background: #1f2937; color: #f97316; border-top: 1px solid #374151; }
        .rundown-table tr:hover { background: #1f2937; }

        #map { 
            position: absolute; left: 360px; top: 0; width: calc(100% - 360px); height: 100%;
            background: #0d0e12; transition: left 0.3s ease, width 0.3s ease; z-index: 1;
        }
        #map.expanded { left: 0; width: 100%; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 11, 13, 0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; color: #f97316; font-size: 16px; font-weight: bold; flex-direction: column; gap: 10px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #1f2937; border-top: 4px solid #f97316; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            #sidebar { width: 85%; max-width: 320px; }
            #sidebar.closed { left: -100%; }
            #map { left: 0; width: 100%; }
            #map.expanded { left: 0; width: 100%; }
            #right-panel { width: 85%; max-width: 320px; right: -100%; }
            #right-panel.open { right: 0; }
        }
    </style>
</head>
<body>

    <button id="toggle-btn" onclick="toggleSidebar()">☰</button>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Menghubungkan Sumbu Utama Master Data v1.0...</div>
    </div>

    <div id="sidebar">
        <h1>🎛️ PUSDALOP REBORN</h1>
        <div class="sub-title">Live Realtime Engine Sync (v1.0 Build)</div>
        
        <div class="time-box">
            <label style="font-size: 10px; font-weight: bold; color: #4ade80;" id="clock-label">⚡ LIVE SYSTEM CLOCK:</label>
            <div class="clock" id="live-clock">00:00:00</div>
            
            <div class="time-controls">
                <label style="color:#f97316; font-weight:bold;">🕰️ TIME MANIPULATOR:</label>
                <input type="range" id="time-slider" min="0" max="86399" value="0" oninput="onTimeSliderChange()">
                <div class="speed-reset-container">
                    <select id="speed-select" class="speed-select" onchange="changeSpeed()">
                        <option value="0.5">0.5x Slow</option>
                        <option value="1" selected>1x Normal</option>
                        <option value="2">2x Speed</option>
                        <option value="3">3x Speed</option>
                        <option value="4">4x Speed</option>
                        <option value="10">10x Speed</option>
                        <option value="60">60x (1 Mnt/dtk)</option>
                    </select>
                    <button onclick="resetTime()" class="reset-btn">🔄 RESET LIVE</button>
                </div>
            </div>
        </div>

        <input type="text" id="search-input" class="search-box" placeholder="🔍 Masukin Nama / No.KA Premium..." onkeyup="filterActiveTrains()">
        
        <div>
            <h3 style="font-size: 12px; color: #f97316; margin-bottom: 8px;">🚂 DAFTAR UNIT LIVE DI LINTASAN:</h3>
            <div id="train-list-container" style="display: flex; flex-direction: column; gap: 8px;">
                <span style="color: #64748b; font-size: 12px;">Membuka manifes radar...</span>
            </div>
        </div>
    </div>

    <div id="right-panel">
        <button class="close-right-btn" onclick="closeRightPanel()">❌ Tutup Rundown</button>
        <div id="rundown-content">
        </div>
    </div>

    <div id="map"></div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('map').classList.toggle('expanded');
            setTimeout(() => { map.invalidateSize(); }, 300);
        }

        function closeRightPanel() {
            document.getElementById('right-panel').classList.remove('open');
        }

        function formatMsToTime(ms) {
            let sec = Math.floor(ms / 1000);
            let h = Math.floor(sec / 3600) % 24;
            let m = Math.floor((sec % 3600) / 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        // =======================================================
        // KAMUS STASIUN 
        // =======================================================
        const stationDict = {
            "GMR": "Gambir", "BKS": "Bekasi", "PSE": "Pasar Senen", "JAKK": "Jakarta Kota",
            "JNG": "Jatinegara", "MRI": "Manggarai", "TBH": "Tambun", "CKR": "Cikarang",
            "BD": "Bandung", "YK": "Yogyakarta", "SGU": "Surabaya Gubeng", "CN": "Cirebon",
            "SMT": "Semarang Tawang", "SMC": "Semarang Poncol", "SLO": "Solo Balapan", 
            "ML": "Malang", "PWT": "Purwokerto", "KTA": "Kutoarjo", "THB": "Tanah Abang"
        };

        function getFullStationName(st_cd, st_name) {
            let name = st_name || stationDict[st_cd] || "Stasiun";
            return `${name} (${st_cd})`;
        }
        // =======================================================

        function openRundownPanel(trainId) {
            const panel = document.getElementById('right-panel');
            const content = document.getElementById('rundown-content');
            
            const ka = dbTrains.find(t => Number(t.tr_id) === trainId);
            if (!ka) return;

            let html = `<h2 style="color:#4ade80; font-size:18px; margin-top:10px;">🚂 ${ka.tr_name} [${ka.tr_cd}]</h2>`;
            html += `<p style="font-size:12px; color:#94a3b8; margin-bottom:10px;">Relasi: ${ka.relation}</p>`;
            
            // UPDATE: TEKS DISCLAIMER AKURASI ASLI GEN Z 🥀
            html += `<div style="background: #1c1917; border: 1px dashed #ef4444; padding: 10px; border-radius: 6px; font-size: 11px; color: #fca5a5; margin-bottom: 12px; line-height: 1.4;">
                        ⚠️ <b>DISCLAIMER:</b> Jangan nelan mentah-mentah data di mari gais, <i>literally</i> ini cuma perhitungan kasar radar engine 💀. Mending buruan cek aplikasi resmi KAI langsung biar valid! 🤓
                     </div>`;

            html += `<table class="rundown-table">
                        <tr>
                            <th>Stasiun</th>
                            <th>Tiba</th>
                            <th>Berangkat</th>
                            <th>Jarak Next</th>
                        </tr>`;
            
            if (ka.paths && ka.paths.length > 0) {
                for (let i = 0; i < ka.paths.length; i++) {
                    let st = ka.paths[i];
                    
                    let tiba = st.arriv_ms ? formatMsToTime(st.arriv_ms) : '-';
                    let brgkt = st.depart_ms ? formatMsToTime(st.depart_ms) : '-';
                    
                    let distStr = '🏁 Akhir';
                    if (i < ka.paths.length - 1) {
                        let nextSt = ka.paths[i+1];
                        let point1 = L.latLng(st.lat, st.lng);
                        let point2 = L.latLng(nextSt.lat, nextSt.lng);
                        let distKm = (point1.distanceTo(point2) / 1000).toFixed(2);
                        distStr = `~${distKm} km`;
                    }
                    
                    html += `<tr>
                                <td><strong>${getFullStationName(st.st_cd, st.st_name)}</strong></td>
                                <td style="color:#fcd34d;">${tiba}</td>
                                <td style="color:#4ade80;">${brgkt}</td>
                                <td style="color:#94a3b8;">${distStr}</td>
                             </tr>`;
                }
            } else {
                html += `<tr><td colspan="4" style="text-align:center;">Data lintasan nggak ketemu bre.</td></tr>`;
            }
            
            html += `</table>`;
            content.innerHTML = html;
            panel.classList.add('open');
        }

        // =======================================================
        // MENU PANEL STASIUN (SHOW AKTIF KA)
        // =======================================================
        function openStationPanel(st_cd, st_name) {
            const panel = document.getElementById('right-panel');
            const content = document.getElementById('rundown-content');
            
            let html = `<h2 style="color:#38bdf8; font-size:18px; margin-top:10px;">🚉 ${st_name} [${st_cd}]</h2>`;
            html += `<p style="font-size:12px; color:#94a3b8; margin-bottom:10px;">Daftar KA Aktif di Lintas Stasiun Ini</p>`;
            
            // UPDATE: TEKS DISCLAIMER JADWAL STASIUN AKURASI ASLI GEN Z 🥀
            html += `<div style="background: #1c1917; border: 1px dashed #ef4444; padding: 10px; border-radius: 6px; font-size: 11px; color: #fca5a5; margin-bottom: 12px; line-height: 1.4;">
                        ⚠️ <b>DISCLAIMER:</b> Jangan nelan mentah-mentah data di mari gais, <i>literally</i> ini cuma perhitungan kasar radar engine 💀. Mending buruan cek aplikasi resmi KAI langsung biar valid! 🤓
                     </div>`;

            html += `<table class="rundown-table">
                        <tr>
                            <th>KA</th>
                            <th>Relasi</th>
                            <th>Status Aktual</th>
                        </tr>`;
            
            const currentMs = globalSeconds * 1000;
            let activeTrainsCount = 0;

            dbTrains.forEach(ka => {
                const seg = getLiveActiveSegment(ka, currentMs);
                if (seg) { 
                    const isPassingHere = ka.paths.some(p => p.st_cd === st_cd);
                    if (isPassingHere) {
                        activeTrainsCount++;
                        let statusStr = seg.isNgetem ? 
                            `Ngetem di ${getFullStationName(seg.stA.st_cd, seg.stA.st_name)}` : 
                            `OTW ${getFullStationName(seg.stB.st_cd, seg.stB.st_name)}`;
                            
                        html += `<tr>
                                    <td style="color:#fcd34d; font-weight:bold; cursor:pointer;" onclick="selectAndFocusTrain(${ka.tr_id})">
                                        ${ka.tr_name}<br><span style="font-size:10px; color:#94a3b8;">[${ka.tr_cd}]</span>
                                    </td>
                                    <td>${ka.relation}</td>
                                    <td style="color:#4ade80;">${statusStr}</td>
                                 </tr>`;
                    }
                }
            });

            if (activeTrainsCount === 0) {
                html += `<tr><td colspan="3" style="text-align:center; padding:15px;">Lagi sepi bre, gaada pergerakan aktif di mari. 🥀</td></tr>`;
            }
            
            html += `</table>`;
            content.innerHTML = html;
            panel.classList.add('open');

            if (window.innerWidth <= 768) { 
                document.getElementById('sidebar').classList.add('closed');
                document.getElementById('map').classList.add('expanded');
            }
        }

        const map = L.map('map', { preferCanvas: true }).setView([-6.2146, 106.8451], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        let dbTrains = [];
        let dbRoutes = {};
        let dbStations = []; 
        
        let activeMarkersMap = new Map();
        let activePolylinesMap = new Map();
        let selectedTrainId = null;
        
        let globalSeconds = 0;
        let isSimMode = false;
        let timeMultiplier = 1;

        window.onload = async function() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('closed');
                document.getElementById('map').classList.add('expanded');
            }

            try {
                const loaderText = document.getElementById('loader-text');
                
                loaderText.innerText = "⏳ Membaca database stasiun basedata/stations.json...";
                const resStations = await fetch('basedata/stations.json');
                const stationsData = await resStations.json();
                dbStations = stationsData.data || stationsData; 

                loaderText.innerText = "⏳ Membaca database dinamis basedata/trains.json...";
                const resTrains = await fetch('basedata/trains.json');
                const trainsData = await resTrains.json();
                dbTrains = trainsData.data || trainsData;

                loaderText.innerText = "⏳ Memetakan geometri rel basedata/routes.json...";
                const resRoutes = await fetch('basedata/routes.json');
                const routesData = await resRoutes.json();
                dbRoutes = routesData.data || routesData;

                renderStationMarkers(); 
                renderStaticRoutes(); // UPDATE: PEMETAAN WARNA JALUR REL JARINGAN SE-INDONESIA 🗺️

                document.getElementById('loader').style.display = 'none';
                startCoreLiveEngine();
            } catch (err) {
                console.error(err);
                document.getElementById('loader-text').innerHTML = `<span style="color: #ef4444;">❌ Gagal Booting v1.0! Pastiin folder 'basedata/' lengkap (trains, routes, stations) di Laragon lo, bre!</span>`;
            }
        };

        // Fungsi Render Titik Stasiun
        function renderStationMarkers() {
            dbStations.forEach(st => {
                if (st.latitude && st.longitude) {
                    const stMarker = L.circleMarker([st.latitude, st.longitude], {
                        radius: 4,
                        color: '#38bdf8', 
                        fillColor: '#0369a1',
                        fillOpacity: 0.7,
                        weight: 2
                    }).addTo(map);

                    stMarker.bindTooltip(`<b>${st.station_name}</b><br>${st.station_code}`, { direction: 'top' });
                    
                    stMarker.on('click', () => {
                        openStationPanel(st.station_code, st.station_name);
                    });
                }
            });
        }

        // =======================================================
        // UPDATE BARU: ENGINE MAPPER WARNA JALUR REL PER KATEGORI
        // =======================================================
        function renderStaticRoutes() {
            let routeTypesMap = {};

            // Deteksi network type otomatis dari manifes kereta
            dbTrains.forEach(ka => {
                let type = 'regular';
                let trType = (ka.tr_type || '').toLowerCase();
                let trName = (ka.tr_name || '').toLowerCase();
                let trCd = (ka.tr_cd || '').toLowerCase();

                if (trType.includes('whoosh') || trName.includes('whoosh') || trCd.startsWith('g')) {
                    type = 'whoosh';
                } else if (trType.includes('mrt') || trName.includes('mrt') || trCd.startsWith('m-')) {
                    type = 'mrt';
                } else if (trType.includes('lrt') || trName.includes('lrt') || trCd.startsWith('l-')) {
                    type = 'lrt';
                }

                if (ka.paths) {
                    ka.paths.forEach(p => {
                        if (p.route_id) {
                            routeTypesMap[p.route_id] = type;
                        }
                    });
                }
            });

            // Mulai render garis permanen di peta sesuai rules warna pesanan lu
            Object.keys(dbRoutes).forEach(routeId => {
                let type = routeTypesMap[routeId];

                // Heuristic fallback deteksi string jika tidak dilewati armada dinas aktif saat itu
                if (!type) {
                    let rData = dbRoutes[routeId];
                    let rCode = (rData.code || '').toLowerCase();
                    let startSt = (rData.start_st || '').toLowerCase();
                    let endSt = (rData.end_st || '').toLowerCase();

                    if (rCode.includes('whoosh') || startSt.includes('kc') || endSt.includes('kc')) {
                        type = 'whoosh';
                    } else if (rCode.includes('mrt') || startSt.startsWith('m-') || endSt.startsWith('m-')) {
                        type = 'mrt';
                    } else if (rCode.includes('lrt') || startSt.startsWith('l-') || endSt.startsWith('l-') || rCode.includes('lrt')) {
                        type = 'lrt';
                    } else {
                        type = 'regular';
                    }
                }

                // Palet Pewarnaan Jalur PUSDALOP
                let polyColor = '#3b82f6'; // Kereta Biasa / KRL = Biru 🔵
                if (type === 'whoosh') polyColor = '#ef4444'; // Whoosh = Merah 🔴
                if (type === 'mrt') polyColor = '#22c55e';    // MRT = Hijau 🟢
                if (type === 'lrt') polyColor = '#f97316';    // LRT = Oranye 🟠

                if (dbRoutes[routeId] && dbRoutes[routeId].geometry) {
                    const routeGeom = dbRoutes[routeId].geometry;
                    let polyCoords = routeGeom.map(pt => [pt[1], pt[0]]);
                    
                    // Digambar tipis-elegan biar gak numpuk kontras sama lari loko realtime
                    L.polyline(polyCoords, { 
                        color: polyColor, 
                        weight: 2.5, 
                        opacity: 0.45 
                    }).addTo(map);
                }
            });
        }

        function formatTimeFromSeconds(sec) {
            let h = Math.floor(sec / 3600);
            let m = Math.floor((sec % 3600) / 60);
            let s = Math.floor(sec % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateClockUI() {
            document.getElementById('live-clock').innerText = formatTimeFromSeconds(globalSeconds);
            document.getElementById('time-slider').value = Math.floor(globalSeconds);
        }

        function onTimeSliderChange() {
            isSimMode = true;
            globalSeconds = parseInt(document.getElementById('time-slider').value);
            document.getElementById('clock-label').innerText = "⏱️ SIMULASI PREDIKSI:";
            document.getElementById('clock-label').style.color = "#fb923c";
            document.getElementById('live-clock').style.color = "#fb923c";
            updateClockUI();
            executeRadarTickEngine();
        }

        function changeSpeed() {
            timeMultiplier = parseFloat(document.getElementById('speed-select').value);
            if (!isSimMode && timeMultiplier !== 1) {
                isSimMode = true;
                document.getElementById('clock-label').innerText = `⏱️ SIMULASI (${timeMultiplier}x):`;
                document.getElementById('clock-label').style.color = "#fb923c";
                document.getElementById('live-clock').style.color = "#fb923c";
            }
        }

        function resetTime() {
            isSimMode = false;
            timeMultiplier = 1;
            document.getElementById('speed-select').value = "1";
            document.getElementById('clock-label').innerText = "⚡ LIVE SYSTEM CLOCK:";
            document.getElementById('clock-label').style.color = "#4ade80";
            document.getElementById('live-clock').style.color = "#4ade80";
            
            const d = new Date();
            globalSeconds = (d.getHours() * 3600) + (d.getMinutes() * 60) + d.getSeconds();
            updateClockUI();
            executeRadarTickEngine();
        }

        function startCoreLiveEngine() {
            const d = new Date();
            globalSeconds = (d.getHours() * 3600) + (d.getMinutes() * 60) + d.getSeconds();
            updateClockUI();

            setInterval(() => {
                if (isSimMode) {
                    globalSeconds += timeMultiplier;
                    if (globalSeconds >= 86400) globalSeconds -= 86400; 
                    if (globalSeconds < 0) globalSeconds += 86400;
                    updateClockUI();
                } else {
                    const dt = new Date();
                    globalSeconds = (dt.getHours() * 3600) + (dt.getMinutes() * 60) + dt.getSeconds();
                    updateClockUI();
                }
                executeRadarTickEngine();
            }, 1000);
        }

        function getLiveActiveSegment(ka, currentMs) {
            if (!ka.paths || ka.paths.length < 2) return null;

            let departAwal = Number(ka.depart_ms || ka.paths[0].depart_ms || 0);
            let tibaAkhir = Number(ka.arriv_ms || ka.paths[ka.paths.length - 1].arriv_ms || 0);

            let loopMs = currentMs;
            let isOvernight = ka.is_overnight || (tibaAkhir < departAwal);

            if (isOvernight) {
                if (currentMs < tibaAkhir) loopMs += 86400000;
                tibaAkhir += 86400000;
            }

            if (loopMs < departAwal || loopMs > tibaAkhir) return null;

            for (let i = 0; i < ka.paths.length; i++) {
                let arr = Number(ka.paths[i].arriv_ms || ka.paths[i].depart_ms || 0);
                let dep = Number(ka.paths[i].depart_ms || ka.paths[i].arriv_ms || 0);
                
                if (isOvernight) {
                    if (arr < ka.depart_ms) arr += 86400000;
                    if (dep < ka.depart_ms) dep += 86400000;
                }

                if (loopMs >= arr && loopMs <= dep) {
                    return { isNgetem: true, stA: ka.paths[i], progressRatio: 0 };
                }
            }

            for (let i = 0; i < ka.paths.length - 1; i++) {
                let tStart = Number(ka.paths[i].depart_ms || ka.paths[i].arriv_ms || 0);
                let tEnd = Number(ka.paths[i+1].arriv_ms || ka.paths[i+1].depart_ms || 0);

                if (isOvernight) {
                    if (tStart < ka.depart_ms) tStart += 86400000;
                    if (tEnd < ka.depart_ms) tEnd += 86400000;
                }

                if (loopMs > tStart && loopMs < tEnd) {
                    return { isNgetem: false, stA: ka.paths[i], stB: ka.paths[i+1], progressRatio: (loopMs - tStart) / (tEnd - tStart || 1) };
                }
            }
            return null;
        }

        function filterActiveTrains() { executeRadarTickEngine(); }

        function selectAndFocusTrain(id) {
            selectedTrainId = Number(id);
            if (window.innerWidth <= 768) { toggleSidebar(); }
            openRundownPanel(id);
            executeRadarTickEngine();
        }

        function executeRadarTickEngine() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();
            const listContainer = document.getElementById('train-list-container');
            
            const currentMs = globalSeconds * 1000;
            let runningTrainsThisTurn = new Set();
            let htmlListContent = "";

            dbTrains.forEach(ka => {
                const matchKeyword = ka.tr_name.toLowerCase().includes(keyword) || ka.tr_cd.toLowerCase().includes(keyword);
                if (keyword !== "" && !matchKeyword) return;

                const seg = getLiveActiveSegment(ka, currentMs);
                if (keyword === "" && !seg) return;

                const trainId = Number(ka.tr_id);
                runningTrainsThisTurn.add(trainId);

                let inlineStatus = "Standby";
                let currentPosCoords = null;

                if (seg) {
                    if (seg.isNgetem) {
                        inlineStatus = `🛑 Ngetem di ${getFullStationName(seg.stA.st_cd, seg.stA.st_name)}`;
                        currentPosCoords = [seg.stA.lat, seg.stA.lng];
                    } else {
                        inlineStatus = `⚡ OTW: ${getFullStationName(seg.stA.st_cd, seg.stA.st_name)} ➔ ${getFullStationName(seg.stB.st_cd, seg.stB.st_name)}`;
                        const latA = seg.stA.lat; const lngA = seg.stA.lng;
                        const latB = seg.stB.lat; const lngB = seg.stB.lng;
                        currentPosCoords = [
                            latA + (latB - latA) * seg.progressRatio,
                            lngA + (lngB - lngA) * seg.progressRatio
                        ];
                    }
                } else {
                    currentPosCoords = [ka.paths[0].lat, ka.paths[0].lng];
                    inlineStatus = `💤 Standby di ${getFullStationName(ka.start_st_cd, ka.start_st_name)}`;
                }

                const isSelectedClass = (selectedTrainId === trainId) ? "selected" : "";
                htmlListContent += `
                    <div class="train-card ${isSelectedClass}" onclick="selectAndFocusTrain(${trainId})">
                        <div class="train-name">${ka.tr_name} [${ka.tr_cd}]</div>
                        <div style="color: #94a3b8; font-size: 11px; margin-top:2px;">Relasi: ${ka.relation}</div>
                        <div style="font-size: 11px; color:#4ade80; font-weight:bold; margin-top:4px;">📍 ${inlineStatus}</div>
                    </div>`;

                if (currentPosCoords) {
                    if (activeMarkersMap.has(trainId)) {
                        const existingMarker = activeMarkersMap.get(trainId);
                        existingMarker.setLatLng(currentPosCoords);
                        existingMarker.off('click').on('click', () => { selectAndFocusTrain(trainId); });
                        existingMarker.getPopup().setContent(`<b>${ka.tr_name} (${ka.tr_cd})</b><br>${inlineStatus}<br>Relasi: ${ka.relation}`);
                        
                        if (selectedTrainId === trainId) { 
                            map.setView(currentPosCoords, 13); 
                            existingMarker.openPopup(); 
                            selectedTrainId = null; 
                        }
                    } else {
                        const newMarker = L.marker(currentPosCoords, {
                            icon: L.divIcon({ html: `<div style="font-size:24px; transform:translate(-10px,-10px); filter:drop-shadow(0 0 5px #f97316); cursor:pointer;">🚂</div>`, className: 'node-loko' })
                        }).addTo(map).bindPopup(`<b>${ka.tr_name} (${ka.tr_cd})</b><br>${inlineStatus}<br>Relasi: ${ka.relation}`);
                        
                        newMarker.on('click', () => { selectAndFocusTrain(trainId); });
                        activeMarkersMap.set(trainId, newMarker);
                        
                        if (selectedTrainId === trainId) { 
                            map.setView(currentPosCoords, 13); 
                            newMarker.openPopup(); 
                            selectedTrainId = null; 
                        }
                    }

                    if (seg && !seg.isNgetem && seg.stB && seg.stB.route_id && dbRoutes[seg.stB.route_id]) {
                        if (!activePolylinesMap.has(trainId)) {
                            const routeGeom = dbRoutes[seg.stB.route_id].geometry;
                            let polyCoords = routeGeom.map(pt => [pt[1], pt[0]]);
                            const polyline = L.polyline(polyCoords, { color: '#f97316', weight: 3, opacity: 0.5 }).addTo(map);
                            activePolylinesMap.set(trainId, polyline);
                        }
                    }
                }
            });

            listContainer.innerHTML = htmlListContent === "" ? `<span style="color:#64748b; font-size:12px;">Kagak ada armada premium aktif di menit lintas ini, gaeess. 🥀</span>` : htmlListContent;

            activeMarkersMap.forEach((marker, id) => { if (!runningTrainsThisTurn.has(id)) { map.removeLayer(marker); activeMarkersMap.delete(id); } });
            activePolylinesMap.forEach((poly, id) => { if (!runningTrainsThisTurn.has(id)) { map.removeLayer(poly); activePolylinesMap.delete(id); } });
        }
    </script>
